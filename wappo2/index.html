<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wappo2 Web</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="game-panel">
      <div class="hud">
        <div>
          <strong id="appTitle">Wappo2 Web</strong>
          <span id="status">Загрузка...</span>
        </div>
        <div class="hud-actions">
          <button id="restartBtn" type="button">Заново</button>
          <button id="menuBtn" type="button">Меню</button>
        </div>
      </div>
      <canvas id="gameCanvas" width="240" height="320" aria-label="Wappo2 game canvas"></canvas>
      <div class="controls">
        <button data-action="up" type="button">&uarr;</button>
        <div class="controls-row">
          <button data-action="left" type="button">&larr;</button>
          <button data-action="down" type="button">&darr;</button>
          <button data-action="right" type="button">&rarr;</button>
        </div>
      </div>
    </section>
  </main>
  <script type="module" src="./app.js"></script>
</body>
</html>
